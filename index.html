<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#121212">
    <title>Pro Chess</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    
    <!-- Game Logic -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <!-- Peer-to-Peer Networking -->
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body>
    <div id="app">
        <!-- Main Menu -->
        <div id="menu" class="panel active">
            <h1>Chess</h1>
            <div class="input-group">
                <input type="text" id="playerName" placeholder="Enter your name" autocomplete="off">
            </div>
            
            <div class="section-title">Play against AI</div>
            <div class="btn-group row">
                <button onclick="startAIGame(1)">Easy</button>
                <button onclick="startAIGame(2)">Med</button>
                <button onclick="startAIGame(3)">Hard</button>
            </div>

            <div class="section-title">Play with a Friend</div>
            <div class="btn-group">
                <button onclick="showHostScreen()" class="primary">Host Game (Get Code)</button>
                <button onclick="showJoinScreen()">Join Game (Enter Code)</button>
            </div>
        </div>

        <!-- Host Screen -->
        <div id="host-screen" class="panel">
            <h2>Hosting Game</h2>
            <p>Share this code with your opponent:</p>
            <div id="room-code-display" class="code-box">Connecting...</div>
            <p id="host-status" class="status-text">Waiting for opponent to join...</p>
            <button onclick="cancelNetwork()" class="secondary">Cancel</button>
        </div>

        <!-- Join Screen -->
        <div id="join-screen" class="panel">
            <h2>Join Game</h2>
            <input type="text" id="join-code" placeholder="Enter 5-letter Code" style="text-transform: uppercase;">
            <p id="join-status" class="status-text"></p>
            <div class="btn-group row">
                <button onclick="cancelNetwork()" class="secondary">Back</button>
                <button onclick="joinGame()" class="primary">Connect</button>
            </div>
        </div>

        <!-- Game Screen -->
        <div id="game-screen" class="panel game-panel">
            <div class="top-bar">
                <div class="player-info">
                    <span id="opp-name">Opponent</span>
                    <div id="opp-status" class="indicator"></div>
                </div>
                <button onclick="quitGame()" class="small-btn">Quit</button>
            </div>

            <div class="board-container">
                <div id="board" class="chessboard"></div>
                <!-- Turn Notification Toaster -->
                <div id="turn-toast" class="toast">It's your turn!</div>
            </div>

            <div class="bottom-bar">
                <div class="player-info">
                    <span id="my-name">You</span>
                    <div id="my-status" class="indicator active-turn"></div>
                </div>
                <div id="game-status-text">Waiting for game to start...</div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
